name: LimboRP
version: ${project.version}
main: com.limborp.LimboRP
api-version: 1.16
author: YourName
description: Replaces special symbols if resource pack is not loaded
commands:
  limborp:
    description: Main command for LimboRP plugin
    usage: /<command> <reload|status|check|debug>
    permission: limborp.admin
permissions:
  limborp.admin:
    description: Admin permissions for LimboRP
    default: op
  limborp.bypass:
    description: Bypass symbol replacement
    default: false
