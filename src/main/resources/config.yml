# LimboRP Configuration
# Plugin version: 1.0.0
# Minecraft version: 1.16.5

# URL ресурспака сервера
resource-pack-url: "https://www.dropbox.com/scl/fi/7ntlmw5u8whoch9bueclj/ReallyWorld1.zip?rlkey=5336zsdn025yq7czlw1khwj3j&st=qktyu55e&dl=1"

# SHA-1 хеш ресурспака (необязательно)
resource-pack-hash: ""

# Режим отладки
debug: true

# ==========================================
# ЗАМЕНЫ СИМВОЛОВ
# ==========================================
# Ключ - символ или текст для замены
# Значение - на что заменять (поддерживает цветовые коды &)
#
# Цветовые коды:
# &0 - Черный        &a - Зеленый
# &1 - Темно-синий   &b - Голубой
# &2 - Темно-зеленый &c - Красный
# &3 - Бирюзовый     &d - Розовый
# &4 - Темно-красный &e - Желтый
# &5 - Фиолетовый    &f - Белый
# &6 - Золотой       &r - Сброс
# &7 - Серый         &l - Жирный
# &8 - Темно-серый   &m - Зачеркнутый
# &9 - Синий         &n - Подчеркнутый
#                    &o - Курсив
#                    &k - Магический
# ==========================================

replacements:
  # Примеры замены специальных символов на цветной текст
  "ꔨ": "&d&lDRAGON &7"
  "ꔩ": "&6&lMAGIC &7"
  "ꔪ": "&b&lRPG &7"
  "ꔫ": "&a&lITEM &7"
  "ꔬ": "&e&lGOLD &7"
  "ꔭ": "&c&lBOSS &7"
  "ꔮ": "&9&lSKILL &7"
  "ꔯ": "&5&lQUEST &7"
  
  # Примеры замены специальных символов на обычные буквы
  "𝐀": "A"
  "𝐁": "B"
  "𝐂": "C"
  "𝐚": "a"
  "𝐛": "b"
  "𝐜": "c"
  
  # Примеры замены букв в кружочках
  "Ⓐ": "A"
  "Ⓑ": "B"
  "Ⓒ": "C"
  
  # Примеры замены целых слов
  "𝖂𝖆𝖗𝖓𝖎𝖓𝖌": "&c&lWARNING"
  "𝕯𝖆𝖓𝖌𝖊𝖗": "&4&lDANGER"
  
  # Русские буквы (если в ресурспаке используются другие символы)
  "А̷": "А"
  "Б̷": "Б"
  "В̷": "В"
